<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="/src/style.css" rel="stylesheet">
  <title>topico</title>
</head>

<body class="min-w-dvw min-h-dvh bg-[#0e0e0e] flex flex-col items-center justify-center overflow-hidden text-white">

  <div class="fixed inset-0 flex items-end justify-center">

    <div class="flex items-end w-full h-full">

      <div class="flex-1 flex items-end h-full">
        <div class="bar-inner bar-1">
          <div class="shimmer-layer shimmer-1"></div>
        </div>
      </div>

      <div class="flex-1 flex items-end h-full">
        <div class="bar-inner bar-2">
          <div class="shimmer-layer shimmer-2"></div>
        </div>
      </div>

      <div class="flex-1 flex items-end h-full">
        <div class="bar-inner bar-3">
          <div class="shimmer-layer shimmer-3"></div>
        </div>
      </div>

      <div class="flex-1 flex items-end h-full">
        <div class="bar-inner bar-4">
          <div class="shimmer-layer shimmer-4"></div>
        </div>
      </div>

      <div class="flex-1 flex items-end h-full">
        <div class="bar-inner bar-5">
          <div class="shimmer-layer shimmer-5"></div>
        </div>
      </div>

    </div>

    <!-- Floor glow -->
    <div class="fixed bottom-0 left-0 right-0 h-px"
      style="background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 20%, rgba(255,255,255,0.09) 50%, rgba(255,255,255,0.04) 80%, transparent 100%); animation: var(--animate-floor);">
    </div>

  </div>
  <header></header>

  <main class="grow flex justify-center items-center relative z-10 flex-col gap-7 -mt-28">
    <img src="./logo.svg" alt="">
    <p class="uppercase">La opinión pública también se construye</p>
    <a class="bg-white p-3 uppercase text-black" href="mailto:contacto@topico.mx">contacto@topico.mx</a>
  </main>


  <footer class="bg-black flex justify-between w-full px-9 py-4 text-xs relative z-10">
    <span>© 2026 TOPICO</span>

    <ul class="flex divide-white divide-x ">
      <li class="px-2"><a href="https://www.facebook.com/topico-mx" target="_blank"
          rel="noopener noreferrer">Facebook</a></li>
      <li class="px-2"><a href="https://www.instagram.com/topico.mx" target="_blank"
          rel="noopener noreferrer">Instagram</a></li>
    </ul>

  </footer>



  <script type="module" src="/src/main.js"></script>
</body>

</html>
